services:
  db:
    image: postgres:16
    container_name: kirimaja-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lokal
      POSTGRES_DB: kirimaja_db
    ports:
      - '5433:5432'
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 20s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - '6379:6379'
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 20s
      retries: 5
  redisinsight:
    image: redis/redisinsight:2.54
    container_name: redisinsight
    ports:
      - '8001:8001'
    restart: unless-stopped
    depends_on:
      - redis

  redis-commander:
    image: rediscommander/redis-commander
    container_name: redis-ui
    ports:
      - '8081:8081'
    environment:
      - REDIS_HOSTS=local:redis:6379
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
